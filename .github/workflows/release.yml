name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: archive.exe
            asset_name: archive-windows-x64.exe
          - os: ubuntu-latest
            artifact_name: archive
            asset_name: archive-linux-x64
          - os: macos-latest
            artifact_name: archive
            asset_name: archive-macos-arm64
          - os: macos-14
            artifact_name: archive
            asset_name: archive-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Locate binary (Windows)
        if: matrix.os == 'windows-latest'
        run: copy build\Release\${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Locate binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp build/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}